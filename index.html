<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRZ Clinic - Agendamento</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <main class="page">
    <section class="booking-panel" aria-labelledby="booking-title">
      <div class="panel-header">
        <p class="eyebrow">Portal de agendamento</p>
        <img src="assets/logos/logo-fundo-branco.png" class="logo" alt="Logo clínica médica">
        <p class="subtitle">Agende sua consulta médica informando a data, horário e seus dados de contato.</p>
      </div>

      <form id="appointment-form" class="booking-form" novalidate>
        <div class="field-group">
          <label for="appointment-date">Data da consulta</label>
          <input type="date" id="appointment-date" name="appointment-date" required>
        </div>

        <div class="field-group">
          <label for="appointment-time">Horário disponível</label>
          <select id="appointment-time" name="appointment-time" required disabled>
            <option value="">Selecione uma data primeiro</option>
          </select>
        </div>

        <div class="field-grid">
          <div class="field-group">
            <label for="patient-name">Nome completo</label>
            <input type="text" id="patient-name" name="patient-name" placeholder="Ex.: Ana Silva" required>
          </div>

          <div class="field-group">
            <label for="patient-phone">Telefone</label>
            <input type="tel" id="patient-phone" name="patient-phone" placeholder="(00) 00000-0000" required>
          </div>
        </div>

        <div class="field-group">
          <label for="patient-email">E-mail</label>
          <input type="email" id="patient-email" name="patient-email" placeholder="paciente@email.com" required>
        </div>

        <button type="submit">Confirmar agendamento</button>
      </form>

      <div id="appointment-summary" class="summary" aria-live="polite"></div>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
